name: Refresh commodity data

on:
  schedule:
    # 12:00 UTC on the 3rd of every month. World Bank Pink Sheet is typically
    # released within the first few business days of the month.
    - cron: "0 12 3 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data pipeline
        run: python prep_data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          LATEST=$(python -c "import json; print(json.load(open('data/metadata.json'))['date_range']['end'][:10])")
          git commit -m "chore(data): refresh Pink Sheet through ${LATEST}"
          git push
